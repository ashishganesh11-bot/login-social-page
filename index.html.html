<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobiyantra - Social Media Platform</title>
  <link rel="stylesheet" href="app.css">
</head>

<body>

  <div class="circle circle1"></div>
  <div class="circle circle2"></div>

  <div class="login-box">

    <div class="logo-section">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300">
        <!-- Left parallelogram (Black) -->
        <path d="M30 110L165 20L165 180L30 270Z" fill="#000000"/>
        <!-- Middle parallelogram (Dark Blue) -->
        <path d="M165 110L300 20L300 180L165 270Z" fill="#0052A3"/>
        <!-- Right parallelogram (Black) -->
        <path d="M300 110L435 20L435 180L300 270Z" fill="#000000"/>
      </svg>
    </div>

    <h2 id="boxTitle">Mobiyantra</h2>
    <h1 class="sub">Social Media Platform</h1>

    <div class="tab-buttons">
      <button type="button" class="tab-btn active" data-tab="login">Login</button>
      <button type="button" class="tab-btn" data-tab="signup">Create Account</button>
    </div>

    <p id="boxSubtitle">Login to continue 🚀</p>

    <form id="loginForm">

      <div class="input-box">
        <input 
          type="email"
          id="loginEmail"
          placeholder="Enter your email"
          required
        >
      </div>

      <div class="input-box">
        <input 
          type="password"
          id="loginPassword"
          placeholder="Enter your password"
          required
        >
      </div>

      <button type="submit">
        Login
      </button>

      <div class="message" id="loginMsg"></div>

    </form>

    <form id="signupForm" class="hidden">

      <div class="input-box">
        <input 
          type="text"
          id="signupName"
          class="name"
          placeholder="Enter your name"
          required
        >
      </div>

      <div class="input-box">
        <input 
          type="email"
          id="signupEmail"
          placeholder="Enter your email"
          required
        >
      </div>

      <div class="input-box">
        <input 
          type="password"
          id="signupPassword"
          placeholder="Create a password"
          required
        >
      </div>

      <div class="input-box">
        <input 
          type="password"
          id="signupConfirmPassword"
          placeholder="Confirm your password"
          required
        >
      </div>

      <button type="submit">
        Create Account
      </button>

      <div class="message" id="signupMsg"></div>

    </form>

</div>
  <script src="app.js"></script>
  <script>
    switchTab("login");
  </script>
</body>
</html>
